name: Build debug APK

# 언제 자동 빌드를 돌릴지 정합니다.
#  - push: 코드를 GitHub에 올릴 때마다 자동 실행
#  - workflow_dispatch: GitHub 화면에서 손으로도 실행 가능
on:
  push:
  workflow_dispatch:

# 아래 단계에서 고정 서명 키를 저장소에 저장(커밋)할 수 있도록 쓰기 권한을 줍니다.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1) 저장소의 코드를 빌드 서버로 가져옵니다.
      - name: Checkout
        uses: actions/checkout@v4

      # 2) 앱 조립에 필요한 자바(JDK 17)를 설치합니다.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3) 고정된 debug 서명 키를 준비합니다.
      #    - 저장소에 키가 아직 없으면: 이번에 한 번 만들어서 저장소에 저장(커밋)합니다.
      #    - 이미 있으면: 그대로 사용합니다.
      #    이렇게 하면 이후 모든 빌드가 '항상 같은 키'로 서명되어,
      #    앱을 지우지 않고 덮어쓰기 업데이트가 됩니다.
      - name: Ensure fixed debug keystore
        run: |
          if [ ! -f keystore/debug.keystore ]; then
            echo "고정 debug 키가 없어 새로 만듭니다."
            mkdir -p keystore
            keytool -genkeypair -v \
              -keystore keystore/debug.keystore \
              -storetype PKCS12 \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add keystore/debug.keystore
            git commit -m "Add fixed debug keystore for stable signing"
            git push
            echo "고정 debug 키를 저장소에 저장했습니다."
          else
            echo "이미 고정 debug 키가 있습니다. 그대로 사용합니다."
          fi

      # 4) 조립 도구(Gradle) 8.9 버전을 준비합니다.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # 5) 한글 조합 엔진 자동 테스트를 먼저 실행합니다.
      #    하나라도 실패하면 여기서 빌드가 멈추고, 다음 단계(APK 만들기)는 실행되지 않습니다.
      #    => 테스트가 통과할 때만 APK가 만들어집니다.
      - name: Run unit tests (Hangul engine)
        run: gradle testDebugUnitTest --no-daemon

      # 6) 테스트가 모두 통과하면 debug APK(설치 파일)를 만듭니다. (고정 키로 서명됨)
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      # 7) 테스트 결과 보고서를 항상 올립니다. (실패 시 어떤 케이스가 틀렸는지 확인용)
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      # 8) 만들어진 APK를 다운로드할 수 있게 Artifacts에 올립니다.
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
